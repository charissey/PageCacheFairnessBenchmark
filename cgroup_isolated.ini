; cgroup_isolated.ini — isolated layout: give the victim a memory.low floor
; equal to its working set; no hard cap forcing B out. Tests whether standard
; cgroup v2 memory protection recovers A's p99.

[client1_steady]
cgroup_name = client1_steady
memory.low = 1G
io.weight = 100

[client2_noisy]
cgroup_name = client2_noisy
io.weight = 100
