; cgroup_isolated.ini — isolated layout:
; Can set hard caps. Tests whether standard
; cgroup v2 memory protection recovers A's p99.

[client1_steady]
cgroup_name = client1_steady
io.weight = 100
memory.max = 2G
memory.min = 1G

[client2_noisy]
cgroup_name = client2_noisy
io.weight = 100
memory.max = 2G 
memory.min = 1G
