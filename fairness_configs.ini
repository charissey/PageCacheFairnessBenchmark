; fairness_configs.ini — victim (Tenant A) + noisy-neighbor (Tenant B) workloads.
;
; Sizes are chosen relative to the cgroup memory cap (memory.max = 2G in
; cgroup_shared.ini): ~0.5x cap for the victim hot set, 2-4x cap for B.
;
; The two sections used by `dual` mode MUST be named client1_steady (A) and
; client2_noisy (B). Extra sections below are baseline / characterization
; workloads runnable individually or via `all`.

; ================================================================
; Tenant A — the victim (what we measure: clat p99)
; ================================================================
[client1_steady]
description = Hot-set random reader; report clat p99 (rate-limited SLO signal)
file_size = 1G
phase_0_pattern = randread
phase_0_block_size = 4k
phase_0_rate_iops = 5000
phase_0_iodepth = 1
phase_0_numjobs = 4
phase_0_runtime = 60
phase_0_ioengine = libaio
; 5000 IOPS × 60 s ≈ 300,000 reads of 4k blocks
; [TODO-1] skew the hot set so refaults actually hurt (Zipf theta=1.2)
; phase_0_random_distribution = zipf:1.2

; ================================================================
; Tenant B — the noisy neighbor. Default = buffered dirty writer
; (Mechanism 2). Swap phase_0_* for one of the variants below.
; ================================================================
[client2_noisy]
description = Random buffered writer generating dirty writeback (Mechanism 2)
file_size = 8G
phase_0_pattern = randwrite
phase_0_block_size = 4k
phase_0_rate_iops = 20000
phase_0_iodepth = 32
phase_0_numjobs = 4
phase_0_runtime = 60
phase_0_ioengine = libaio
; 20000 IOPS × 60 s ≈ 1,200,000 writes of 4k blocks

; ---------------- Tenant A baseline ----------------
[victim_alone]
description = Victim alone; flat-p99 reference
file_size = 1G
phase_0_pattern = randread
phase_0_block_size = 4k
phase_0_rate_iops = 5000
phase_0_iodepth = 1
phase_0_numjobs = 4
phase_0_runtime = 60
phase_0_ioengine = libaio
;phase_0_random_distribution = zipf:1.2

; ---------------- Tenant B variants ----------------
[b_scan_clean]
description = Mechanism 1 — large clean sequential scan; LRU pollution, no writeback
file_size = 8G
phase_0_pattern = read
phase_0_block_size = 1M
phase_0_iodepth = 1
phase_0_numjobs = 1
phase_0_runtime = 60
phase_0_ioengine = libaio

[b_randwrite_dirty]
description = Mechanism 2 — buffered random writer; eviction + dirty writeback
file_size = 8G
phase_0_pattern = randwrite
phase_0_block_size = 4k
phase_0_rate_iops = 20000
phase_0_iodepth = 32
phase_0_numjobs = 4
phase_0_runtime = 60
phase_0_ioengine = libaio

[b_mixed]
description = Mechanism 1 + 2 — mixed random read/write neighbor
file_size = 8G
phase_0_pattern = randrw
phase_0_rwmixread = 50
phase_0_block_size = 4k
phase_0_rate_iops = 20000
phase_0_iodepth = 32
phase_0_numjobs = 4
phase_0_runtime = 60
phase_0_ioengine = libaio

[b_checkpoint]
description = Periodic flush bursts (PostgreSQL checkpoint / etcd commit)
file_size = 4G
phase_0_pattern = write
phase_0_block_size = 1M
phase_0_iodepth = 1
phase_0_numjobs = 1
phase_0_runtime = 60
phase_0_ioengine = libaio
; [TODO-2] fdatasync every 1000 write ops -> big periodic flush bursts
phase_0_fdatasync = 1000

[b_wal_append]
description = Append-only log dirtying (bbolt / etcd WAL)
file_size = 4G
phase_0_pattern = write
phase_0_block_size = 4k
phase_0_iodepth = 1
phase_0_numjobs = 1
phase_0_runtime = 60
phase_0_ioengine = libaio
; [TODO-2] fdatasync every 32 ops -> frequent small flushes (WAL cadence)
phase_0_fdatasync = 32
