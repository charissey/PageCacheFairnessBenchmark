; fairness_configs.ini — victim (Tenant A) + noisy-neighbor (Tenant B) workloads.
;
; Sizes are chosen relative to the cgroup memory cap (memory.max = 2G in
; cgroup_shared.ini): ~0.5x cap for the victim hot set, 2-4x cap for B.
;
; The two sections used by `dual` mode MUST be named client1_steady (A) and
; client2_noisy (B). Run either section alone for Case 1 baselines.

; ================================================================
; Tenant A — the victim (what we measure: clat p99)
; ================================================================
[client1_steady]
description = Isolated victim baseline: read 1G once/phase then idle (no aggressor)
file_size = 1G

phase_0_pattern = randread
phase_0_block_size = 4k
phase_0_io_size = 1G
phase_0_rate_iops = 50000
phase_0_iodepth = 1
phase_0_numjobs = 1
phase_0_runtime = 30
phase_0_ioengine = libaio

phase_1_pattern = randread
phase_1_block_size = 4k
phase_1_io_size = 1G
phase_1_rate_iops = 50000
phase_1_iodepth = 1
phase_1_numjobs = 1
phase_1_runtime = 30
phase_1_ioengine = libaio

phase_2_pattern = randread
phase_2_block_size = 4k
phase_2_io_size = 1G
phase_2_rate_iops = 50000
phase_2_iodepth = 1
phase_2_numjobs = 1
phase_2_runtime = 30
phase_2_ioengine = libaio

; ================================================================
; Tenant B — client2 (aggressor). Streams its 8G file for the full 60s each
; phase, RAMPING bandwidth across phases to drive the eviction story above.
;   phase 0: rate=1k  → ~120MB read (pool stays ~1.5G, no eviction)
;   phase 1: rate=50k → ~6GB read   (overflows the 2G pool, evicts by end)
;   phase 2: rate=1k  → ~120MB read (no eviction)
; ================================================================
[client2_noisy]
description = Isolated aggressor baseline: stream 8G, ramp bandwidth 1k -> 50k -> 1k
file_size = 8G

phase_0_pattern = read
phase_0_block_size = 4k
phase_0_rate_iops = 1024
phase_0_iodepth = 1
phase_0_numjobs = 1
phase_0_runtime = 30
phase_0_ioengine = libaio

phase_1_pattern = read
phase_1_block_size = 4k
phase_1_rate_iops = 50000
phase_1_iodepth = 32
phase_1_numjobs = 4
phase_1_runtime = 30
phase_1_ioengine = libaio

phase_2_pattern = read
phase_2_block_size = 4k
phase_2_rate_iops = 1024
phase_2_iodepth = 1
phase_2_numjobs = 1
phase_2_runtime = 30
phase_2_ioengine = libaio
