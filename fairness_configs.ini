; fairness_configs.ini — victim (Tenant A) + noisy-neighbor (Tenant B) workloads.
;
; Sizes are chosen relative to the cgroup memory cap (memory.max = 2G in
; cgroup_shared.ini): ~0.5x cap for the victim hot set, 2-4x cap for B.
;
; The two sections used by `dual` mode MUST be named client1_steady (A) and
; client2_noisy (B). Run either section alone for Case 1 baselines.

; ================================================================
; Tenant A — the victim (what we measure: clat p99)
; ================================================================
[client1_steady]
description = Victim: read 1G file once/phase (io_size=1G @ 100 MiB/s) then idle; record clat p99/p999 + refault
file_size = 1G

; --- phase 0 (annotated; phases 1-2 identical) ---
phase_0_pattern = read        ; fio --rw: sequential read (loads the whole file)
phase_0_block_size = 4k       ; fio --bs: 4 KiB per I/O
phase_0_io_size = 1G          ; fio --io_size: read exactly 1G once, then stop
phase_0_rate_bw = 100m        ; fio --rate: 100 MiB/s → 1G takes ~10s
phase_0_iodepth = 1           ; fio --iodepth: one in-flight I/O = clean latency
phase_0_numjobs = 1
phase_0_runtime = 60          ; ceiling only (io_size set → not time_based)
phase_0_ioengine = libaio

; --- phase 1 (identical to phase 0) ---
phase_1_pattern = read
phase_1_block_size = 4k
phase_1_io_size = 1G
phase_1_rate_bw = 100m
phase_1_iodepth = 1
phase_1_numjobs = 1
phase_1_runtime = 60
phase_1_ioengine = libaio

; --- phase 2 (identical to phase 0) ---
phase_2_pattern = read
phase_2_block_size = 4k
phase_2_io_size = 1G
phase_2_rate_bw = 100m
phase_2_iodepth = 1
phase_2_numjobs = 1
phase_2_runtime = 60
phase_2_ioengine = libaio

; ================================================================
; Tenant B — client2 (aggressor). Streams its 8G file for the full 60s each
; phase, RAMPING bandwidth across phases to drive the eviction story above.
;   phase 0: rate=8m   → ~480MB read  (pool stays ~1.5G, no eviction)
;   phase 1: rate=100m → ~6GB read    (overflows the 2G pool, evicts by end)
;   phase 2: unlimited → burst        (evicts everything, client1 forced to disk)
; ================================================================
[client2_noisy]
description = Aggressor: stream 8G file, ramp bandwidth 8m -> 100m -> unlimited to evict client1
file_size = 8G

; --- phase 0: light (reads < 500MB) ---
phase_0_pattern = read        ; sequential stream
phase_0_block_size = 4k
phase_0_rate_bw = 8m          ; 8 MiB/s × 60s ≈ 480 MB (< 500MB)
phase_0_iodepth = 32
phase_0_numjobs = 1
phase_0_runtime = 60          ; time_based (no io_size) → runs the full 60s
phase_0_ioengine = libaio

; --- phase 1: crank up (fills + overflows the 2G pool) ---
phase_1_pattern = read
phase_1_block_size = 4k
phase_1_rate_bw = 100m        ; 100 MiB/s × 60s ≈ 6GB → overflows pool
phase_1_iodepth = 32
phase_1_numjobs = 1
phase_1_runtime = 60
phase_1_ioengine = libaio

; --- phase 2: burst (unlimited; no rate_bw) → evicts everything ---
phase_2_pattern = read
phase_2_block_size = 4k
phase_2_iodepth = 32
phase_2_numjobs = 1
phase_2_runtime = 60
phase_2_ioengine = libaio
