; fairness_configs.ini — victim (Tenant A) + noisy-neighbor (Tenant B) workloads.
;
; Sizes are chosen relative to the cgroup memory cap (memory.max = 2G in
; cgroup_shared.ini): ~0.5x cap for the victim hot set, 2-4x cap for B.
;
; The two sections used by `dual` mode MUST be named client1_steady (A) and
; client2_noisy (B). Run either section alone for Case 1 baselines.

; ================================================================
; Tenant A — the victim (what we measure: clat p99)
; ================================================================
[client1_steady]
description = Hot-set random reader; report clat p99 (rate-limited SLO signal)
file_size = 1G
phase_0_pattern = randread
phase_0_block_size = 4k
phase_0_rate_iops = 5000
phase_0_iodepth = 1
phase_0_numjobs = 4
phase_0_runtime = 60
phase_0_ioengine = libaio
; 5000 IOPS × 60 s ≈ 300,000 reads of 4k blocks for each job
; [TODO-1] skew the hot set so refaults actually hurt (Zipf theta=1.2)
; phase_0_random_distribution = zipf:1.2

; ================================================================
; Tenant B — the noisy neighbor. Edit phase_0_* for Mechanism 1
; (randread / sequential read) vs Mechanism 2 (randread / randwrite).
; ================================================================
[client2_noisy]
description = Random buffered random reader (Mechanism 2)
; Can be changed to writer generating dirty writeback with randwrite
file_size = 8G
phase_0_pattern = randread
phase_0_block_size = 4k
phase_0_rate_iops = 20000
phase_0_iodepth = 32
phase_0_numjobs = 4
phase_0_runtime = 60
phase_0_ioengine = libaio
; 20000 IOPS × 60 s ≈ 1,200,000 writes of 4k blocks for each job
