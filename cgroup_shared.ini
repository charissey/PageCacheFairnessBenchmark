; cgroup_shared.ini — shared page-cache pool (2G parent cap).
; Both tenants live under one parent cgroup so they compete for the same
; cache. Change the single memory.max line per Case 4-6 (see README).

[clients]
cgroup_name = clients
memory.max = 2G

[client1_steady]
cgroup_name = clients/client1_steady
io.weight = 100

[client2_bursty]
cgroup_name = clients/client2_bursty
io.weight = 100
